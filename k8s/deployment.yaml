apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable
  namespace: stable
  labels:
    app.kubernetes.io/name: stable
    app.kubernetes.io/part-of: accountability-layer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stable
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stable
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: stable
          image: stable:latest
          ports:
            - containerPort: 8000
              name: http
              hostPort: 8000
          env:
            - name: DB_PATH
              value: /data/ledger.db
            - name: KEYS_DIR
              value: /data/keys
            # Hardened defaults for a real deployment.
            - name: STRICT_SIGNING
              value: "true"
            - name: STAMP_INTERVAL
              value: "30"
            # Shared-token auth — sourced from a Secret (see secret.yaml).
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stable-auth
                  key: api-token
          readinessProbe:
            httpGet:
              path: /verify
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /verify
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stable-data
