apiVersion: v1
kind: Service
metadata:
  name: stable
  namespace: stable
  labels:
    app.kubernetes.io/name: stable
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: stable
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stable-data
  namespace: stable
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
